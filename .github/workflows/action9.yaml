name: Functions
on: 
  push:
  workflow_dispatch:
jobs:
  echo1:
    runs-on: ubuntu-latest
    steps:
      - name: Failing Step
        run: exit 1
      - name: I will be skipped
        if: ${{ success() }}
        run: echo "I will pring if previous steps succeed."
      - name: I will execute
        if: ${{ failure() }}
        run: echo "I will print if any previous step fails."
      - name: I will execute
        if: ${{ !cancelled() }}
        run: echo "I will always print, except when the workflow is cancelled."
      - name: I will execcute when cencelled
        if: ${{ cancelled() }}
        run: echo "I will execute when cancelled."