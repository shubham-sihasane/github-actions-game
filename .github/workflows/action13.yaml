name: Caching
on: 
  push:
  workflow_dispatch:
    inputs:
      use-cache:
        type: boolean
        default: true
        description: Whether to execute cache step
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory: react-app # React packages file directory location
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
      - name: Install Dependencies
        run: npm ci
      - name: Testing
        run: npm run test
      - name: Building
        run: npm run build
      - name: Deploying to nonprod
        run: echo "Deploying to non-prod"
