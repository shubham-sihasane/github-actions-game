name: Variables
on:
  push:
  workflow_dispatch:
env:
  WORKFLOW_VAR: "I am a workflow env var"
  OVERWRITTEN: "I will be overwritten"
jobs:
  echo:
    runs-on: ubuntu-latest
    env:
      JOB_VAR: "I am a job env var"
      OVERWRITTEN: "I have been overwritten at the job level"
    steps:
      - name: "Print Env variables"
        env:
          STEP_VAR: "I am a step env var"
          step_var2: "I am anotehr step var"
        run: |
          echo "Step env var: ${{ env.STEP_VAR}}"
          echo "Step env var 2: ${{ env.step_var2 }}"
          echo "Job env var: ${{ env.JOB_VAR}}"
          echo "Workflow env var: ${{ env.WORKFLOW_VAR}}"
          echo "Overwritten: ${{ env.OVERWRITTEN}}"
      - name: "Overwrite JOb Variable"
        env:
          OVERWRITTEN: "I have been overwritten at the step level"
        run: |
          echo "Step env var: ${{ env.OVERWRITTEN}}"
  echo2:
    runs-on: ubuntu-latest
    steps:
      - name: Print Variables
        # run: echo "Organization Variable ${{ vars.ORG_VAR}}"
        run: |
          echo "Repository Variable: ${{ vars.REPO_VAR}}"
  echo-prod:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Print Prod Variable
        run: |
          echo "Environment Variables: ${{ vars.TARGET_VAR}}"
  echo-staging:
    runs-on: ubuntu-latest
    environment: Staging
    steps:
      - name: Print Staging Variable
        run: |
          echo "Environment Variables: ${{ vars.TARGET_VAR}}"