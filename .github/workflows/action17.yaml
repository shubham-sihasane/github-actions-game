name: Workflow Security
on:
  pull_request:
jobs:
  unsafe_pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Check PR Title
        run: |
          title=${{github.event.pull_request.title}}
          if [[ $title =~ ^feat ]]; then
          echo "'PR is a feature type"
          exit 0
          else
          echo "PR is not a feature type"
          exit 1
          fi