name: GitHub Actions
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory: react-app # React packages file directory location
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      # - name: Printing Folder
      #   run: |
      #     pwd
      #     ls
      #     tree .
      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "20.x"
      - name: Install Dependencies
        run: npm ci
      - name: Run Unit Tests
        run: npm run test
