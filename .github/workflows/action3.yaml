name: Third Workflow
on:
  push
jobs:
  ubuntu-echo:
    runs-on: ubuntu-latest
    steps:
      - name: Show OS
        run: echo "This job is running on an Ubuntu runner."
  windows-echo:
    runs-on: windows-latest
    steps:
      - name: Show OS
        run: "This job is running on a Windows runner."
  mac-echo:
    runs-on: macos-latest
    steps:
      - name: Show OS
        shell: bash
        run: echo "This job is running on a MacOs runner."