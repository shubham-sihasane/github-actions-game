name: Matrices
on: 
  workflow_dispatch:
jobs:
  backword_compatibility:
    name: ${{ matrix.os}}-${{matrix.node-version}}
    runs-on: ${{ matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        node-version:
          - 18.x
          - 20.x
          - 21.x
        include:
          - os: ubuntu-latest
            node-version: 16.x
          - os: ubuntu-latest
            node-version: 21.x
            tag: experimental
    steps:
      - name: Setup Node - ${{ matrix.node-version}}
        run: echo "Running tests on ${{ matrix.os}} and NodeJs ${{ matrix.node-version}}"
      - name: Fail if experimental
        if: matrix.tag == 'experimental'
        run: exit 1
      - name: Upload results
        run: echo "Upload results"

  include-example:
    runs-on: ubuntu-latest
    name: ${{matrix.color}}-${{matrix.shape}}-${{matrix.size}}
    strategy:
      matrix:
        color:
          - red
          - green
        shape:
          - circle
          - square
        size:
          - small
          - large
        include:
          - color: red
            shape: triangle
    steps:
      - name: Dummy Step
        run: echo "${{matrix.color}}-${{matrix.shape}}-${{matrix.size}}"
